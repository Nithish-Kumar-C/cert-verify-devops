version: "3.9"

services:

  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: certverify-db
    restart: always
    environment:
      MYSQL_DATABASE: certverify_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - certverify-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pcertpass123"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Django Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: certverify-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - certverify-network
    volumes:
      - static_files:/app/staticfiles

  # ── React Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: certverify-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - certverify-network
    volumes:
      - static_files:/app/staticfiles

# ── Named Volumes ───────────────────────────────────────────
volumes:
  mysql_data:
  static_files:

# ── Network ─────────────────────────────────────────────────
networks:
  certverify-network:
    driver: bridge
